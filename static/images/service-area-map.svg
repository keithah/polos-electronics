<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <title>Washington service map</title>
  <desc>Washington state outline with major city markers for Vancouver, Battle Ground, Kelso, Olympia, Seattle, Bellingham, Yakima, Spokane, Walla Walla, and Kennewick.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1b2330" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="url(#paper)"/>

  <!-- Washington outline -->
  <path d="M112 70 L218 60 L360 58 L510 64 L650 58 L760 78 L806 130 L792 210 L806 300 L782 386 L716 462 L560 492 L382 500 L260 488 L176 444 L128 382 L112 280 Z"
        fill="#dadfe6" stroke="#b8bfca" stroke-width="3" filter="url(#soft-shadow)"/>

  <!-- Puget Sound indentation -->
  <path d="M214 134 L286 134 L292 324 L260 324 L256 286 L238 266 L252 244 L234 224 L214 212 Z"
        fill="#f8f9fb" stroke="#c0c6d0" stroke-width="2"/>

  <!-- Southwest service emphasis -->
  <path d="M146 384 L338 384 L338 488 L176 444 Z" fill="#fe3a46" fill-opacity="0.20"/>
  <path d="M146 326 L232 326 L232 384 L146 384 Z" fill="#fe3a46" fill-opacity="0.14"/>

  <!-- Major city points -->
  <g fill="#1e5b96" stroke="#ffffff" stroke-width="2.5">
    <circle cx="210" cy="446" r="7"/><!-- Vancouver -->
    <circle cx="170" cy="374" r="7"/><!-- Kelso -->
    <circle cx="232" cy="286" r="7"/><!-- Olympia -->
    <circle cx="280" cy="238" r="7"/><!-- Seattle -->
    <circle cx="274" cy="110" r="7"/><!-- Bellingham -->
    <circle cx="516" cy="330" r="7"/><!-- Yakima -->
    <circle cx="736" cy="250" r="7"/><!-- Spokane -->
    <circle cx="666" cy="414" r="7"/><!-- Walla Walla -->
    <circle cx="620" cy="360" r="7"/><!-- Kennewick -->
  </g>

  <!-- Battle Ground smaller star -->
  <g transform="translate(236 426)">
    <polygon points="0,-10 3,-3 10,-3 4,1 6,8 0,4 -6,8 -4,1 -10,-3 -3,-3"
             fill="#151d27" stroke="#ffffff" stroke-width="1.2"/>
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="19" fill="#232b35" font-weight="700">
    <text x="288" y="116">Bellingham</text>
    <text x="293" y="244">Seattle</text>
    <text x="245" y="292">Olympia</text>
    <text x="526" y="336">Yakima</text>
    <text x="746" y="256">Spokane</text>
    <text x="676" y="420">Walla Walla</text>
    <text x="630" y="366">Kennewick</text>
    <text x="220" y="452">Vancouver</text>
    <text x="180" y="380">Kelso</text>
    <text x="250" y="430">Battle Ground</text>
  </g>

  <!-- Key -->
  <g transform="translate(560 430)">
    <rect width="268" height="82" rx="10" fill="#ffffff" fill-opacity="0.92" stroke="#c8ced8"/>
    <rect x="14" y="14" width="12" height="12" rx="2" fill="#fe3a46" fill-opacity="0.35"/>
    <text x="34" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2b3440">Primary service-region emphasis</text>
    <circle cx="20" cy="44" r="6" fill="#1e5b96" stroke="#ffffff" stroke-width="1.6"/>
    <text x="34" y="48" font-family="Arial, sans-serif" font-size="14" fill="#2b3440">Major Washington cities</text>
    <polygon points="20,62 23,69 30,69 24,73 26,80 20,76 14,80 16,73 10,69 17,69"
             fill="#151d27" stroke="#ffffff" stroke-width="0.9"/>
    <text x="34" y="78" font-family="Arial, sans-serif" font-size="14" fill="#2b3440">Battle Ground</text>
  </g>
</svg>
