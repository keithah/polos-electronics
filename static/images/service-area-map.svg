<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <title>Polos Electronics Service Area - Washington State</title>
  <desc>Service area map showing Clark County (primary), Cowlitz and Skamania counties (secondary), with Battle Ground headquarters marked</desc>

  <!-- Washington State Background (simplified outline) -->
  <path id="wa-state" d="M10,50 L50,10 L200,5 L350,10 L450,5 L550,20 L590,60 L580,120 L590,200 L570,280 L520,350 L400,380 L250,390 L100,385 L50,350 L20,280 L10,180 Z"
        fill="#e0e0e0" stroke="#ffffff" stroke-width="2"/>

  <!-- Other Counties (simplified shapes for visual context) -->
  <!-- Pacific County -->
  <path d="M20,280 L50,260 L80,280 L70,320 L40,340 L20,320 Z" fill="#e0e0e0" stroke="#ffffff" stroke-width="1"/>
  <!-- Lewis County (north of Clark/Cowlitz) -->
  <path id="lewis" d="M100,230 L200,220 L280,230 L290,270 L220,290 L150,290 L120,270 Z" fill="#e0e0e0" stroke="#ffffff" stroke-width="1.5"/>
  <text x="190" y="260" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">Lewis</text>
  <!-- Wahkiakum County -->
  <path d="M50,320 L100,310 L110,340 L80,360 L50,350 Z" fill="#e0e0e0" stroke="#ffffff" stroke-width="1"/>

  <!-- Cowlitz County (secondary - lighter red) -->
  <path id="cowlitz" d="M80,280 L120,270 L150,290 L160,340 L130,370 L90,360 L70,330 Z"
        fill="#fe8a91" stroke="#ffffff" stroke-width="1.5"/>
  <text x="105" y="325" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">Cowlitz</text>

  <!-- Skamania County (secondary - lighter red) -->
  <path id="skamania" d="M220,290 L300,280 L320,320 L280,370 L220,360 L200,320 Z"
        fill="#fe8a91" stroke="#ffffff" stroke-width="1.5"/>
  <text x="260" y="330" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">Skamania</text>

  <!-- Clark County (primary - brand red) -->
  <path id="clark" d="M150,300 L220,290 L230,320 L240,370 L200,390 L150,385 L130,360 L140,330 Z"
        fill="#fe3a46" stroke="#ffffff" stroke-width="2"/>
  <text x="185" y="350" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">Clark County</text>

  <!-- Battle Ground Pin Marker -->
  <g id="battle-ground-marker" transform="translate(175, 305)">
    <!-- Pin shadow -->
    <ellipse cx="8" cy="26" rx="6" ry="2" fill="rgba(0,0,0,0.2)"/>
    <!-- Pin body -->
    <path d="M8 0C3.6 0 0 3.6 0 8c0 6 8 16 8 16s8-10 8-16c0-4.4-3.6-8-8-8z" fill="#323232"/>
    <!-- Pin inner circle -->
    <circle cx="8" cy="8" r="3" fill="#ffffff"/>
  </g>
  <!-- Battle Ground Label -->
  <text x="200" y="305" font-family="sans-serif" font-size="9" fill="#323232" font-weight="600">Battle Ground</text>

  <!-- Legend -->
  <g id="legend" transform="translate(420, 300)">
    <rect x="0" y="0" width="12" height="12" fill="#fe3a46" rx="2"/>
    <text x="18" y="10" font-family="sans-serif" font-size="9" fill="#323232">Primary Service Area</text>

    <rect x="0" y="20" width="12" height="12" fill="#fe8a91" rx="2"/>
    <text x="18" y="30" font-family="sans-serif" font-size="9" fill="#333">Also Serving</text>

    <rect x="0" y="40" width="12" height="12" fill="#e0e0e0" rx="2"/>
    <text x="18" y="50" font-family="sans-serif" font-size="9" fill="#666">Licensed Statewide</text>
  </g>

  <!-- Title -->
  <text x="300" y="30" font-family="sans-serif" font-size="14" fill="#323232" font-weight="bold" text-anchor="middle">Service Area</text>
</svg>
