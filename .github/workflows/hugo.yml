name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.135.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Validate reliability inputs
        run: |
          # Validate reviews.json data contract
          jq -e '
            (.reviews | type == "array") and
            (.fallbackReviews | type == "array") and
            ((.reviews | length) + (.fallbackReviews | length) >= 9) and
            (.platforms | type == "object") and
            (.lastUpdated | type == "string")
          ' data/reviews.json > /dev/null || { echo "ERROR: reviews.json missing required fields (reviews, fallbackReviews, platforms, lastUpdated) or insufficient review count"; exit 1; }

          jq -e '
            (.staleAfterDays | type == "number")
          ' data/reviews.json > /dev/null || { echo "ERROR: reviews.json missing staleAfterDays (must be number)"; exit 1; }

          jq -e '
            (.freshnessLabel | type == "string")
          ' data/reviews.json > /dev/null || { echo "ERROR: reviews.json missing freshnessLabel (must be string)"; exit 1; }

          # Validate service_area.json data contract
          jq -e '
            (.tiers | type == "array") and
            (.map.url | type == "string") and
            (.map.fallbackUrl | type == "string") and
            (.map.fallbackContext | type == "string")
          ' data/service_area.json > /dev/null || { echo "ERROR: service_area.json missing required fields (tiers, map.url, map.fallbackUrl, map.fallbackContext)"; exit 1; }

          jq -e '
            (.tiers | length >= 1)
          ' data/service_area.json > /dev/null || { echo "ERROR: service_area.json tiers array must have at least 1 entry"; exit 1; }
      - name: Validate required assets
        run: |
          test -f static/images/service-area-map.svg || \
            { echo "ERROR: Missing service-area-map.svg"; exit 1; }
          test -f assets/images/service-area-map.png || \
            { echo "ERROR: Missing assets/images/service-area-map.png (fallback)"; exit 1; }

          # Optional-but-recommended: fail fast if primary raster assets go missing
          test -f assets/images/hero-image.jpg || \
            { echo "ERROR: Missing assets/images/hero-image.jpg"; exit 1; }
          test -f assets/images/logo.png || \
            { echo "ERROR: Missing assets/images/logo.png"; exit 1; }
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --panicOnWarning
      - name: Smoke check homepage output
        run: |
          test -f public/index.html || \
            { echo "ERROR: index.html not built"; exit 1; }

          grep -q "What Our Customers Say" public/index.html || \
            { echo "ERROR: Reviews section missing from homepage"; exit 1; }

          grep -q "Primary Service Areas" public/index.html || \
            { echo "ERROR: Service area section missing from homepage"; exit 1; }

          grep -q "service-area-map" public/index.html || \
            { echo "ERROR: Service area map missing from homepage"; exit 1; }
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
