name: Fetch Reviews

on:
  schedule:
    - cron: '0 0 1 * *' # Monthly: first day of month at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-reviews:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Ensure reviews contract baseline
        run: |
          if [ ! -f data/reviews.json ]; then
            cat > data/reviews.json <<'JSON'
          {
            "reviews": [],
            "fallbackReviews": [],
            "staleAfterDays": 45,
            "freshnessLabel": "Updated",
            "platforms": {
              "google": {},
              "yelp": {},
              "homeadvisor": {},
              "nextdoor": {}
            },
            "lastUpdated": ""
          }
          JSON
          fi

      - name: Extract platforms metadata
        run: |
          if [ -f data/reviews.json ]; then
            jq '.platforms // {}' data/reviews.json > /tmp/platforms.json
            echo "Preserved platforms metadata"
          else
            echo '{}' > /tmp/platforms.json
            echo "No existing platforms metadata - will use empty object"
          fi

      - name: Validate API credentials and IDs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          YELP_BUSINESS_ID: ${{ secrets.YELP_BUSINESS_ID }}
        run: |
          issues=0

          if [ -z "$GOOGLE_API_KEY" ] || [ -z "$GOOGLE_PLACE_ID" ]; then
            echo "::error::Google credentials missing (GOOGLE_API_KEY or GOOGLE_PLACE_ID)."
            issues=$((issues + 1))
          else
            G_BODY="/tmp/google-validate.json"
            G_HTTP=$(curl -sS -o "$G_BODY" -w "%{http_code}" \
              "https://maps.googleapis.com/maps/api/place/details/json?place_id=${GOOGLE_PLACE_ID}&fields=name&key=${GOOGLE_API_KEY}")
            G_STATUS=$(jq -r '.status // "UNKNOWN"' "$G_BODY")
            G_ERROR=$(jq -r '.error_message // empty' "$G_BODY")

            if [ "$G_HTTP" != "200" ] || [ "$G_STATUS" = "REQUEST_DENIED" ] || [ "$G_STATUS" = "INVALID_REQUEST" ] || [ "$G_STATUS" = "OVER_DAILY_LIMIT" ] || [ "$G_STATUS" = "OVER_QUERY_LIMIT" ]; then
              echo "::error::Google validation failed (http=${G_HTTP}, status=${G_STATUS}) ${G_ERROR}"
              issues=$((issues + 1))
            else
              echo "Google validation ok (status=${G_STATUS})."
            fi
          fi

          BIZ_ID="${YELP_BUSINESS_ID:-polos-electronics-battle-ground}"
          if [ -z "$YELP_API_KEY" ]; then
            echo "::warning::YELP_API_KEY missing. Yelp API fetch will be skipped."
          else
            Y_BODY="/tmp/yelp-validate.json"
            Y_HTTP=$(curl -sS -o "$Y_BODY" -w "%{http_code}" \
              "https://api.yelp.com/v3/businesses/${BIZ_ID}" \
              -H "Authorization: Bearer ${YELP_API_KEY}")

            if [ "$Y_HTTP" = "401" ] || [ "$Y_HTTP" = "403" ]; then
              echo "::error::Yelp validation failed (http=${Y_HTTP}) invalid or unauthorized YELP_API_KEY."
              issues=$((issues + 1))
            elif [ "$Y_HTTP" = "404" ]; then
              echo "::error::Yelp validation failed (http=404) invalid YELP_BUSINESS_ID: ${BIZ_ID}."
              issues=$((issues + 1))
            elif [ "$Y_HTTP" != "200" ]; then
              echo "::error::Yelp validation failed (http=${Y_HTTP}) unexpected upstream response."
              issues=$((issues + 1))
            else
              echo "Yelp validation ok (business=${BIZ_ID})."
            fi
          fi

          if [ "$issues" -gt 0 ]; then
            echo "API validation failed with ${issues} issue(s)."
            exit 1
          fi

      - name: Fetch Google Reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ] || [ -z "$GOOGLE_PLACE_ID" ]; then
            echo "Google secrets missing - skipping Google fetch"
            echo '[]' > /tmp/google-reviews.json
            echo '{"overallRating": null, "totalReviews": null}' > /tmp/google-stats.json
            exit 0
          fi

          GOOGLE_BODY="/tmp/google-response.json"
          GOOGLE_HTTP_CODE=$(curl -sS -o "$GOOGLE_BODY" -w "%{http_code}" \
            "https://maps.googleapis.com/maps/api/place/details/json?place_id=${GOOGLE_PLACE_ID}&fields=name,rating,reviews,user_ratings_total&key=${GOOGLE_API_KEY}")

          if [ "$GOOGLE_HTTP_CODE" != "200" ]; then
            echo "Google API request failed with HTTP ${GOOGLE_HTTP_CODE}."
            echo "Likely causes: invalid key, key restrictions, billing disabled, or transient upstream issue."
            exit 1
          fi

          GOOGLE_STATUS=$(jq -r '.status // "UNKNOWN"' "$GOOGLE_BODY")
          GOOGLE_ERROR=$(jq -r '.error_message // empty' "$GOOGLE_BODY")

          if [ "$GOOGLE_STATUS" = "REQUEST_DENIED" ] || [ "$GOOGLE_STATUS" = "INVALID_REQUEST" ] || [ "$GOOGLE_STATUS" = "OVER_DAILY_LIMIT" ]; then
            echo "Google Places status=${GOOGLE_STATUS}."
            if [ -n "$GOOGLE_ERROR" ]; then
              echo "Google error: ${GOOGLE_ERROR}"
            fi
            echo "Likely key configuration issue (bad key, bad restriction, missing billing, or disabled API)."
            exit 1
          fi

          if [ "$GOOGLE_STATUS" = "OVER_QUERY_LIMIT" ]; then
            echo "Google Places quota exceeded (OVER_QUERY_LIMIT)."
            exit 1
          fi

          RESPONSE=$(cat "$GOOGLE_BODY")

          echo "$RESPONSE" | jq '{
            overallRating: .result.rating,
            totalReviews: .result.user_ratings_total
          }' > /tmp/google-stats.json
          echo "Google stats: rating=$(jq -r '.overallRating' /tmp/google-stats.json), total=$(jq -r '.totalReviews' /tmp/google-stats.json)"

          echo "$RESPONSE" | jq '[.result.reviews[]? | select(.rating >= 4) | {
            id: ("google-" + (.time | tostring)),
            platform: "google",
            author: .author_name,
            rating: .rating,
            text: .text,
            date: .relative_time_description,
            relativeTime: .relative_time_description,
            profilePhoto: .profile_photo_url
          }]' > /tmp/google-reviews.json

          echo "Fetched $(jq 'length' /tmp/google-reviews.json) Google reviews (4-5 stars)"

      - name: Fetch Yelp Reviews
        env:
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          YELP_BUSINESS_ID: ${{ secrets.YELP_BUSINESS_ID }}
        run: |
          if [ -z "$YELP_API_KEY" ]; then
            echo "YELP_API_KEY not configured - skipping Yelp fetch"
            echo "[]" > /tmp/yelp-reviews.json
            echo '{"overallRating": null, "totalReviews": null}' > /tmp/yelp-stats.json
            exit 0
          fi

          BUSINESS_ID="${YELP_BUSINESS_ID:-polos-electronics-battle-ground}"

          YELP_REVIEWS_BODY="/tmp/yelp-reviews-response.json"
          YELP_REVIEWS_HTTP_CODE=$(curl -sS -o "$YELP_REVIEWS_BODY" -w "%{http_code}" \
            "https://api.yelp.com/v3/businesses/${BUSINESS_ID}/reviews" \
            -H "Authorization: Bearer ${YELP_API_KEY}")

          if [ "$YELP_REVIEWS_HTTP_CODE" = "401" ] || [ "$YELP_REVIEWS_HTTP_CODE" = "403" ]; then
            echo "Yelp API auth failed with HTTP ${YELP_REVIEWS_HTTP_CODE}."
            echo "Likely bad or revoked YELP_API_KEY."
            exit 1
          fi

          if [ "$YELP_REVIEWS_HTTP_CODE" = "404" ]; then
            echo "Yelp business not found (HTTP 404)."
            echo "Likely bad YELP_BUSINESS_ID: ${BUSINESS_ID}."
            exit 1
          fi

          if [ "$YELP_REVIEWS_HTTP_CODE" != "200" ]; then
            echo "Yelp Reviews API request failed with HTTP ${YELP_REVIEWS_HTTP_CODE}."
            exit 1
          fi

          RESPONSE=$(cat "$YELP_REVIEWS_BODY")

          YELP_BUSINESS_BODY="/tmp/yelp-business-response.json"
          YELP_BUSINESS_HTTP_CODE=$(curl -sS -o "$YELP_BUSINESS_BODY" -w "%{http_code}" \
            "https://api.yelp.com/v3/businesses/${BUSINESS_ID}" \
            -H "Authorization: Bearer ${YELP_API_KEY}")

          if [ "$YELP_BUSINESS_HTTP_CODE" != "200" ]; then
            echo "Yelp Business API request failed with HTTP ${YELP_BUSINESS_HTTP_CODE}."
            exit 1
          fi

          BUSINESS_RESPONSE=$(cat "$YELP_BUSINESS_BODY")
          echo "$BUSINESS_RESPONSE" | jq '{
            overallRating: .rating,
            totalReviews: .review_count
          }' > /tmp/yelp-stats.json
          echo "Yelp stats: rating=$(jq -r '.overallRating' /tmp/yelp-stats.json), total=$(jq -r '.totalReviews' /tmp/yelp-stats.json)"

          echo "$RESPONSE" | jq '[.reviews[]? | select(.rating >= 4) | {
            id: .id,
            platform: "yelp",
            author: .user.name,
            rating: .rating,
            text: .text,
            date: .time_created,
            relativeTime: .time_created,
            profilePhoto: .user.image_url
          }]' > /tmp/yelp-reviews.json

          echo "Fetched $(jq 'length' /tmp/yelp-reviews.json) Yelp reviews (4-5 stars)"

      - name: Scrape Google Reviews (fallback)
        env:
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: |
          cat > /tmp/scrape-google.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });
            const reviews = [];

            const placeId = process.env.GOOGLE_PLACE_ID || '';
            const targets = [
              'https://share.google/D3mexUt7VZzi7gvWZ',
              placeId ? `https://www.google.com/maps/place/?q=place_id:${placeId}` : ''
            ].filter(Boolean);

            for (const targetUrl of targets) {
              try {
                await page.goto(targetUrl, { waitUntil: 'domcontentloaded', timeout: 45000 });
                await page.waitForTimeout(2500);

                const extracted = await page.evaluate(() => {
                  const out = [];

                  const fromDom = Array.from(document.querySelectorAll('[data-review-id], [jslog*="review"], [role="article"]'));
                  for (const el of fromDom.slice(0, 30)) {
                    const text = (el.textContent || '').replace(/\s+/g, ' ').trim();
                    if (text.length < 60) continue;
                    const author = el.querySelector('[aria-label*="profile"], .d4r55')?.textContent?.trim() || 'Google Reviewer';
                    out.push({ author, text, rating: 5, date: new Date().toISOString().slice(0, 10) });
                  }

                  return out;
                });

                for (const item of extracted) {
                  if ((item.text || '').length > 60) {
                    reviews.push({
                      id: `google-scrape-${Date.now()}-${reviews.length}`,
                      platform: 'google',
                      author: item.author || 'Google Reviewer',
                      rating: item.rating || 5,
                      text: item.text,
                      date: item.date,
                      relativeTime: item.date,
                      profilePhoto: null
                    });
                  }
                }
              } catch (error) {
                console.log('Google scrape target failed:', targetUrl, error.message);
              }
            }

            const seen = new Set();
            const deduped = reviews.filter((r) => {
              const key = `${r.author}|${r.text}`.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            await browser.close();
            console.log(JSON.stringify(deduped));
          })();
          EOF

          node /tmp/scrape-google.js > /tmp/google-scrape-reviews.json 2>/tmp/google-scrape-error.log || echo "[]" > /tmp/google-scrape-reviews.json
          jq -e 'type == "array"' /tmp/google-scrape-reviews.json > /dev/null || echo "[]" > /tmp/google-scrape-reviews.json
          echo "Scraped $(jq 'length' /tmp/google-scrape-reviews.json) Google reviews (fallback)"

      - name: Scrape Yelp Reviews (fallback)
        run: |
          cat > /tmp/scrape-yelp.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });
            const reviews = [];

            try {
              await page.goto('https://www.yelp.com/biz/polos-electronics-battle-ground', {
                waitUntil: 'domcontentloaded',
                timeout: 45000
              });
              await page.waitForTimeout(3000);

              const extracted = await page.evaluate(() => {
                const rows = [];

                const jsonLd = Array.from(document.querySelectorAll('script[type="application/ld+json"]'));
                for (const script of jsonLd) {
                  try {
                    const data = JSON.parse(script.textContent || '{}');
                    const reviews = Array.isArray(data.review) ? data.review : [];
                    for (const r of reviews) {
                      const rating = Number(r?.reviewRating?.ratingValue || 5);
                      rows.push({
                        author: r?.author?.name || 'Yelp Reviewer',
                        text: r?.reviewBody || '',
                        rating,
                        date: r?.datePublished || new Date().toISOString().slice(0, 10)
                      });
                    }
                  } catch (_) {}
                }

                const domReviews = Array.from(document.querySelectorAll('[data-testid="review"], .review, article'));
                for (const el of domReviews.slice(0, 40)) {
                  const text = (el.querySelector('[lang]')?.textContent || el.textContent || '').replace(/\s+/g, ' ').trim();
                  if (text.length < 60) continue;
                  const author = el.querySelector('a[href*="/user_details"]')?.textContent?.trim() || 'Yelp Reviewer';
                  const ratingLabel = el.querySelector('[aria-label*="star rating"]')?.getAttribute('aria-label') || '';
                  const ratingMatch = ratingLabel.match(/([0-9]+(?:\.[0-9]+)?)/);
                  const rating = ratingMatch ? Math.round(parseFloat(ratingMatch[1])) : 5;
                  rows.push({ author, text, rating, date: new Date().toISOString().slice(0, 10) });
                }

                return rows;
              });

              for (const item of extracted) {
                if ((item.text || '').length > 40 && (item.rating || 0) >= 4) {
                  reviews.push({
                    id: `yelp-scrape-${Date.now()}-${reviews.length}`,
                    platform: 'yelp',
                    author: item.author || 'Yelp Reviewer',
                    rating: item.rating || 5,
                    text: item.text,
                    date: item.date,
                    relativeTime: item.date,
                    profilePhoto: null
                  });
                }
              }
            } catch (error) {
              console.log('Yelp scrape failed:', error.message);
            }

            const seen = new Set();
            const deduped = reviews.filter((r) => {
              const key = `${r.author}|${r.text}`.toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            await browser.close();
            console.log(JSON.stringify(deduped));
          })();
          EOF

          node /tmp/scrape-yelp.js > /tmp/yelp-scrape-reviews.json 2>/tmp/yelp-scrape-error.log || echo "[]" > /tmp/yelp-scrape-reviews.json
          jq -e 'type == "array"' /tmp/yelp-scrape-reviews.json > /dev/null || echo "[]" > /tmp/yelp-scrape-reviews.json
          echo "Scraped $(jq 'length' /tmp/yelp-scrape-reviews.json) Yelp reviews (fallback)"

      - name: Scrape HomeAdvisor Reviews
        run: |
          cat > /tmp/scrape-homeadvisor.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            const reviews = [];

            try {
              await page.goto('https://www.homeadvisor.com/rated.PolosElectronicsInc.7529229.html', {
                waitUntil: 'networkidle',
                timeout: 30000
              });

              await page.waitForSelector('[data-testid="review-card"], .review-card, .pro-review', {
                timeout: 10000
              }).catch(() => console.log('Review selector not found, page may have different structure'));

              const reviewElements = await page.$$('[data-testid="review-card"], .review-card, .pro-review, .review-item');

              for (const el of reviewElements.slice(0, 10)) {
                try {
                  const author = await el.$eval('[class*="author"], [class*="name"], .reviewer-name', e => e.textContent?.trim()).catch(() => 'HomeAdvisor User');
                  const rating = await el.$eval('[class*="rating"], [class*="stars"]', e => {
                    const stars = e.querySelectorAll('[class*="filled"], .star-filled, [data-filled="true"]').length;
                    return stars || parseInt(e.getAttribute('data-rating') || e.textContent?.match(/(\d)/)?.[1] || '5', 10);
                  }).catch(() => 5);
                  const text = await el.$eval('[class*="text"], [class*="content"], .review-text, .review-content', e => e.textContent?.trim()).catch(() => '');
                  const date = await el.$eval('[class*="date"], time', e => e.textContent?.trim() || e.getAttribute('datetime')).catch(() => new Date().toISOString().split('T')[0]);

                  if (text && rating >= 4) {
                    reviews.push({
                      id: 'homeadvisor-' + Date.now() + '-' + reviews.length,
                      platform: 'homeadvisor',
                      author,
                      rating: parseInt(rating, 10),
                      text,
                      date,
                      relativeTime: date,
                      profilePhoto: null
                    });
                  }
                } catch (error) {
                  console.log('Error extracting review:', error.message);
                }
              }
            } catch (error) {
              console.error('HomeAdvisor scrape error:', error.message);
            }

            await browser.close();
            console.log(JSON.stringify(reviews));
          })();
          EOF

          node /tmp/scrape-homeadvisor.js > /tmp/homeadvisor-reviews.json 2>/tmp/homeadvisor-error.log || echo "[]" > /tmp/homeadvisor-reviews.json
          echo "Scraped $(jq 'length' /tmp/homeadvisor-reviews.json) HomeAdvisor reviews (4-5 stars)"

      - name: Scrape Nextdoor Reviews
        run: |
          cat > /tmp/scrape-nextdoor.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            const reviews = [];

            try {
              await page.goto('https://nextdoor.com/pages/polos-electronics-battle-ground-wa/', {
                waitUntil: 'networkidle',
                timeout: 30000
              });

              await page.waitForTimeout(3000);

              const reviewElements = await page.$$('[class*="recommendation"], [class*="review"], [class*="testimonial"]');

              for (const el of reviewElements.slice(0, 10)) {
                try {
                  const author = await el.$eval('[class*="author"], [class*="name"]', e => e.textContent?.trim()).catch(() => 'Neighbor');
                  const text = await el.$eval('[class*="text"], [class*="content"], [class*="body"]', e => e.textContent?.trim()).catch(() => '');
                  const date = await el.$eval('[class*="date"], time', e => e.textContent?.trim() || e.getAttribute('datetime')).catch(() => new Date().toISOString().split('T')[0]);

                  if (text) {
                    reviews.push({
                      id: 'nextdoor-' + Date.now() + '-' + reviews.length,
                      platform: 'nextdoor',
                      author,
                      rating: null,
                      text,
                      date,
                      relativeTime: date,
                      profilePhoto: null
                    });
                  }
                } catch (error) {
                  console.log('Error extracting review:', error.message);
                }
              }
            } catch (error) {
              console.error('Nextdoor scrape error:', error.message);
            }

            await browser.close();
            console.log(JSON.stringify(reviews));
          })();
          EOF

          node /tmp/scrape-nextdoor.js > /tmp/nextdoor-reviews.json 2>/tmp/nextdoor-error.log || echo "[]" > /tmp/nextdoor-reviews.json
          echo "Scraped $(jq 'length' /tmp/nextdoor-reviews.json) Nextdoor recommendations"

      - name: Update platforms with stats
        run: |
          if [ -f /tmp/google-stats.json ]; then
            jq --slurpfile stats /tmp/google-stats.json '
              .google = (.google // {}) + $stats[0]
            ' /tmp/platforms.json > /tmp/platforms-updated.json
            mv /tmp/platforms-updated.json /tmp/platforms.json
          fi

          if [ -f /tmp/yelp-stats.json ]; then
            jq --slurpfile stats /tmp/yelp-stats.json '
              .yelp = (.yelp // {}) + $stats[0]
            ' /tmp/platforms.json > /tmp/platforms-updated.json
            mv /tmp/platforms-updated.json /tmp/platforms.json
          fi

          echo "Updated platforms with stats:"
          jq '.' /tmp/platforms.json

      - name: Merge all reviews into data/reviews.json
        run: |
          jq -s '
            . as $all
            | ($all[0] + $all[1] + $all[2] + $all[3] + $all[4] + $all[5]) as $incoming
            | ($all[6]) as $platforms
            | ($all[7]) as $current
            | ($incoming
                | map(select((.text // "") != "" and (.author // "") != "" and (.platform // "") != ""))
                | unique_by((.platform // "") + "|" + (.author // "") + "|" + (.text // ""))
              ) as $deduped
            | {
                reviews: (if ($deduped | length) > 0 then $deduped else ($current.reviews // []) end),
                fallbackReviews: ($current.fallbackReviews // []),
                staleAfterDays: ($current.staleAfterDays // 45),
                freshnessLabel: ($current.freshnessLabel // "Updated"),
                platforms: (($current.platforms // {}) + $platforms),
                lastUpdated: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
              }
          ' /tmp/google-reviews.json /tmp/yelp-reviews.json /tmp/homeadvisor-reviews.json /tmp/nextdoor-reviews.json /tmp/google-scrape-reviews.json /tmp/yelp-scrape-reviews.json /tmp/platforms.json data/reviews.json > /tmp/reviews-updated.json

          mv /tmp/reviews-updated.json data/reviews.json

          echo "Merged reviews:"
          echo "  - Google: $(jq 'length' /tmp/google-reviews.json)"
          echo "  - Yelp: $(jq 'length' /tmp/yelp-reviews.json)"
          echo "  - HomeAdvisor: $(jq 'length' /tmp/homeadvisor-reviews.json)"
          echo "  - Nextdoor: $(jq 'length' /tmp/nextdoor-reviews.json)"
          echo "  - Google scraped: $(jq 'length' /tmp/google-scrape-reviews.json)"
          echo "  - Yelp scraped: $(jq 'length' /tmp/yelp-scrape-reviews.json)"
          echo "  - Total: $(jq '.reviews | length' data/reviews.json)"
          echo "  - Platforms preserved: $(jq '.platforms | keys | length' data/reviews.json)"
          echo "Platform stats captured:"
          echo "  - Google: rating=$(jq -r '.platforms.google.overallRating // "N/A"' data/reviews.json), total=$(jq -r '.platforms.google.totalReviews // "N/A"' data/reviews.json)"
          echo "  - Yelp: rating=$(jq -r '.platforms.yelp.overallRating // "N/A"' data/reviews.json), total=$(jq -r '.platforms.yelp.totalReviews // "N/A"' data/reviews.json)"

      - name: Validate reviews contract
        run: |
          jq -e '
            (.reviews | type == "array") and
            (.fallbackReviews | type == "array") and
            (.staleAfterDays | type == "number") and
            (.freshnessLabel | type == "string") and
            (.platforms | type == "object") and
            (.lastUpdated | type == "string") and
            ((.fallbackReviews | length) >= 3) and
            ((.fallbackReviews | all(has("platform") and has("author") and has("text") and has("date"))))
          ' data/reviews.json > /dev/null

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/reviews.json

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to reviews"
          else
            git commit -m "chore(reviews): refresh multi-source review data [skip ci]"
            git push
            echo "Reviews updated and pushed"
          fi
